server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 정적 파일 (빌드 아티팩트)
    location /assets/ {
        try_files $uri =404;
    }

    # 유효한 경로만 index.html 서빙
    location = / { try_files $uri /index.html; }
    location ~ ^/restaurants/[^/]+$ { try_files $uri /index.html; }
    location = /bookmarks { try_files $uri /index.html; }
    location = /mypage { try_files $uri /index.html; }

    # 그 외 모든 경로 → 루트로 리다이렉트 (트래커 실행 전 차단)
    location / {
        return 301 /;
    }
}
