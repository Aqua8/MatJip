server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://127.0.0.1:3306/matjip?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: your_db_username
    password: your_db_password
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

jwt:
  secret: replace-with-at-least-32-character-secret-key
  expiration: 86400000

gcs:
  bucket-name: your-gcs-bucket-name
